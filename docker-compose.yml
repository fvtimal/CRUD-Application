

services:

  api:
    build: .

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mongo

  mongo:

    image: mongo:latest

    container_name: mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:

  mongo_data: